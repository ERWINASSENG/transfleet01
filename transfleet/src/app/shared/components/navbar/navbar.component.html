<nav class="navbar">
  <a routerLink="/dashboard" class="navbar-brand">
    TransFleet
  </a>

  <div class="navbar-nav" *ngIf="currentUser() as user">
    <a routerLink="/dashboard" routerLinkActive="active" class="nav-link">Tableau de bord</a>
    <a routerLink="/vehicles" routerLinkActive="active" class="nav-link">Véhicules</a>
    <a routerLink="/drivers" routerLinkActive="active" class="nav-link">Conducteurs</a>
    <a routerLink="/trips" routerLinkActive="active" class="nav-link">Trajets</a>
    <a routerLink="/tracking" routerLinkActive="active" class="nav-link">Suivi</a>

    <div class="dropdown" [class.open]="isDropdownOpen">
      <div class="user-menu" (click)="toggleDropdown()">
        <div class="user-avatar">{{ getUserInitials() }}</div>
        <span>{{ user.firstName }} {{ user.lastName }}</span>
      </div>

      <div class="dropdown-menu">
        <a routerLink="/profile" class="dropdown-item">Mon profil</a>
        <a routerLink="/notifications" class="dropdown-item">Notifications</a>
        <div class="dropdown-divider"></div>
        <a (click)="logout()" class="dropdown-item">Déconnexion</a>
      </div>
    </div>
  </div>
</nav>

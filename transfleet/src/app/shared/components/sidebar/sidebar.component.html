<aside class="sidebar" [class.collapsed]="collapsed()">
  <button class="toggle-btn" (click)="toggle()">
    {{ collapsed() ? '→' : '←' }}
  </button>

  <div class="sidebar-header" *ngIf="!collapsed()">
    <h3>Menu</h3>
  </div>

  <nav class="sidebar-nav">
    <a
      *ngFor="let item of mainMenuItems"
      [routerLink]="item.route"
      routerLinkActive="active"
      class="nav-item"
    >
      <span class="nav-icon">{{ item.icon }}</span>
      <span class="nav-label">{{ item.label }}</span>
    </a>
  </nav>

  <div class="sidebar-section" *ngIf="isManager()">
    <div class="section-title" *ngIf="!collapsed()">Gestion</div>
    <nav class="sidebar-nav">
      <a
        *ngFor="let item of managementMenuItems"
        [routerLink]="item.route"
        routerLinkActive="active"
        class="nav-item"
        [style.display]="canShowItem(item) ? 'flex' : 'none'"
      >
        <span class="nav-icon">{{ item.icon }}</span>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    </nav>
  </div>
</aside>
